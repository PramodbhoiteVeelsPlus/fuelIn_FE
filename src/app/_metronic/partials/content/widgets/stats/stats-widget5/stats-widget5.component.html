<div class="card-body">
 
  <div class="fw-bold" [ngClass]="'text-inverse-' + color + ' fs-6'">
    {{ title }}
  </div>
  <div *ngIf="isOS" [ngClass]="'text-inverse-' + color" class="fw-bold text-white me-2 lh-1 ls-n2 fs-5">
   <span *ngIf="!totalOS">
    ₹ 0
   </span>
   <span *ngIf="totalOS">
    ₹ {{ stats | number: "1.2-2" }}
   </span>
  </div>
  <div *ngIf="isSales" [ngClass]="'text-inverse-' + color" class="fw-bold text-white me-2 lh-1 ls-n2 fs-5">
    ₹ {{ stats | number: "1.2-2" }}
  </div>
  <div *ngIf="isPayment" [ngClass]="'text-inverse-' + color" class="fw-bold text-white me-2 lh-1 ls-n2 fs-5">
    ₹ {{ stats | number: "1.2-2"  }}
  </div>

</div>
